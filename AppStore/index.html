  <title>App Store</title>
  <style>
    :root {
      --as-bg: #ffffff;
      --as-surface: #ffffff;
      --as-text: #1d1d1f;
      --as-secondary: #6e6e73;
      --as-accent: #0071e3;
      --as-accent-hover: #0077ed;
      --as-border: rgba(0, 0, 0, 0.08);
      --as-card-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --as-card-shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.1);
      --as-radius: 16px;
      --as-radius-sm: 12px;
    }

    body.appstore-page {
      overflow-x: hidden;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: var(--as-text);
      background: #fff;
    }

    /* ── Layout ── */
    .as-main {
      padding: 80px 0 0;
      min-height: 0;
      flex: 1 0 auto;
    }

    .as-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      max-width: 1200px;
      margin: 0 auto;
      min-height: calc(100vh - 80px);
    }

    /* ── Sidebar ── */
    .as-sidebar {
      padding: 32px 20px 40px 24px;
      position: sticky;
      top: 80px;
      align-self: start;
      height: fit-content;
    }

    .as-sidebar-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: none;
      color: var(--as-secondary);
      padding: 0 12px;
      margin: 0 0 12px;
    }

    .as-nav-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .as-nav-btn {
      --as-category-color: var(--as-accent);
      --as-category-bg: rgba(0, 113, 227, 0.08);
      --as-category-focus: rgba(0, 113, 227, 0.72);
      --as-category-icon-filter: brightness(0) saturate(100%) invert(37%) sepia(97%) saturate(1958%) hue-rotate(196deg) brightness(96%) contrast(99%);
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--as-text);
      font-size: 15px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      font-family: inherit;
    }

    .as-nav-btn[data-key="all"] {
      --as-category-color: #0071e3;
      --as-category-bg: rgba(0, 113, 227, 0.1);
      --as-category-focus: rgba(0, 113, 227, 0.72);
      --as-category-icon-filter: brightness(0) saturate(100%) invert(37%) sepia(97%) saturate(1958%) hue-rotate(196deg) brightness(96%) contrast(99%);
    }

    .as-nav-btn[data-key="games"] {
      --as-category-color: #15803d;
      --as-category-bg: rgba(21, 128, 61, 0.12);
      --as-category-focus: rgba(21, 128, 61, 0.72);
      --as-category-icon-filter: brightness(0) saturate(100%) invert(45%) sepia(66%) saturate(718%) hue-rotate(92deg) brightness(90%) contrast(88%);
    }

    .as-nav-btn[data-key="tools"] {
      --as-category-color: #c2410c;
      --as-category-bg: rgba(194, 65, 12, 0.12);
      --as-category-focus: rgba(194, 65, 12, 0.72);
      --as-category-icon-filter: brightness(0) saturate(100%) invert(35%) sepia(96%) saturate(1474%) hue-rotate(5deg) brightness(92%) contrast(91%);
    }

    .as-nav-btn[data-key="entertainment"] {
      --as-category-color: #7c3aed;
      --as-category-bg: rgba(124, 58, 237, 0.12);
      --as-category-focus: rgba(124, 58, 237, 0.72);
      --as-category-icon-filter: brightness(0) saturate(100%) invert(47%) sepia(53%) saturate(1915%) hue-rotate(228deg) brightness(100%) contrast(94%);
    }

    .as-nav-btn:hover {
      background: var(--as-category-bg);
      color: var(--as-category-color);
    }

    .as-nav-btn.is-active {
      background: var(--as-category-bg);
      color: var(--as-category-color);
    }

    .as-nav-btn.is-active .as-nav-icon {
      opacity: 1;
    }

    .as-nav-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      filter: brightness(0) opacity(0.46);
      opacity: 1;
      transition: filter 0.15s ease, opacity 0.15s ease;
    }

    .as-nav-btn:hover .as-nav-icon {
      filter: var(--as-category-icon-filter);
      opacity: 0.9;
    }

    .as-nav-btn.is-active .as-nav-icon {
      filter: var(--as-category-icon-filter);
      opacity: 1;
    }

    .as-nav-divider {
      height: 1px;
      background: var(--as-border);
      margin: 10px 12px;
    }

    /* ── Content ── */
    .as-content {
      padding: 32px 40px 64px;
      min-width: 0;
    }

    .as-header {
      margin-bottom: 28px;
    }

    .as-title {
      margin: 0 0 6px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--as-text);
    }

    .as-subtitle {
      margin: 0;
      font-size: 17px;
      font-weight: 400;
      color: var(--as-secondary);
      line-height: 1.5;
    }

    /* ── App Cards ── */
    .as-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .as-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--as-surface);
      border-radius: var(--as-radius-sm);
      box-shadow: var(--as-card-shadow);
      border: 1px solid var(--as-border);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .as-card:hover {
      box-shadow: var(--as-card-shadow-hover);
      transform: translateY(-2px);
    }

    .as-card-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      flex-shrink: 0;
      overflow: hidden;
      background: #f0f0f2;
      display: grid;
      place-items: center;
    }

    .as-card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
    }

    .as-card-info {
      flex: 1;
      min-width: 0;
    }

    .as-card-name {
      margin: 0 0 2px;
      font-size: 17px;
      font-weight: 600;
      color: var(--as-text);
      letter-spacing: -0.01em;
    }

    .as-card-desc {
      margin: 0 0 4px;
      font-size: 14px;
      color: var(--as-secondary);
      line-height: 1.4;
    }

    .as-card-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      color: var(--as-secondary);
      text-transform: none;
      letter-spacing: 0;
    }

    .as-card-cta {
      padding: 6px 18px;
      border-radius: 980px;
      background: #f0f0f5;
      color: var(--as-accent);
      border: none;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s ease;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .as-card-cta:hover {
      background: #e8e8ed;
    }

    /* ── Empty state ── */
    .as-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--as-secondary);
      font-size: 15px;
    }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .as-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr;
        min-height: auto;
      }

      .as-content {
        display: contents;
      }

      .as-header {
        order: 1;
        padding: 16px 16px 10px;
        margin-bottom: 0;
      }

      .as-sidebar {
        order: 2;
        position: static;
        display: flex;
        justify-content: center;
        padding: 0 16px 18px;
        height: auto;
      }

      .as-sidebar-title {
        display: none;
      }

      .as-nav-group {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px;
      }

      .as-nav-btn {
        width: auto;
        padding: 8px 16px;
        font-size: 14px;
        border-radius: 980px;
        background: rgba(0, 0, 0, 0.04);
      }

      .as-nav-btn.is-active {
        background: var(--as-text);
        color: #fff;
      }

      .as-nav-btn.is-active .as-nav-icon {
        filter: brightness(0) invert(1) opacity(0.9);
      }

      .as-nav-divider {
        display: none;
      }

      .as-grid {
        order: 3;
        padding: 4px 16px 64px;
        overflow: hidden;
      }

    }

    @media (max-width: 640px) {
      .as-main {
        padding-top: 60px;
      }

      .as-title {
        font-size: 28px;
      }

      .as-subtitle {
        font-size: 15px;
      }

      .as-card {
        gap: 12px;
        padding: 14px;
      }

      .as-card-icon {
        width: 52px;
        height: 52px;
        border-radius: 13px;
      }

      .as-card-icon img {
        border-radius: 13px;
      }

      .as-card-name {
        font-size: 16px;
      }

      .as-card-desc {
        font-size: 13px;
      }
    }
  </style>
  <style>

    }

      flex-direction: column;

    .as-nav-glass.glass-container {
      width: 100%;
      min-height: 0;
      padding: 4px;
      align-items: stretch;
      flex-direction: column;
      justify-content: flex-start;
      gap: 4px;
      border-radius: 18px;
      overflow: visible;
      isolation: isolate;
      contain: none;
      clip-path: none;
      box-shadow: none;
      background: transparent !important;
    }

    .as-nav-glass canvas {
      border-radius: inherit !important;
      box-shadow: none !important;
      z-index: 0;
      opacity: 0;
    }

    .as-nav-glass > canvas,
    .as-liquid-cta > canvas {
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    .as-nav-glass::after,
    .as-liquid-cta::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: inherit;
      pointer-events: none;
    }

    .as-nav-glass::after {
      border: 0;
    }

        clip-path: inset(0 round 22px);
      }

      .as-liquid-nav,
      .as-liquid-nav[data-key] {
        width: 100% !important;
        min-width: 0 !important;
        height: 42px;
        padding: 0 10px;
        border-radius: 17px;
      }
    }

    @media (max-width: 360px) {
      .as-liquid-nav {
        gap: 0;
        padding-inline: 8px;
      }

      .as-liquid-nav .as-nav-icon {
        display: none;
      }

      .as-liquid-nav .as-nav-label {
        font-size: 13px !important;
      }
    }

    @media (max-width: 640px) {
      .as-main {
        padding-top: 60px;
      }

      .as-title {
        font-size: 28px;
      }

      .as-subtitle {

      .as-card.as-material-card {

      }

      .as-card.as-material-card .as-card-icon {
        width: 52px;
        height: 52px;
        border-radius: 13px;
      }

      .as-card.as-material-card .as-card-name {
        font-size: 16px;
      }

      .as-card.as-material-card .as-card-desc {
        font-size: 13px;
      }
    }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/gh/dashersw/liquid-glass-js@78cb6ccb0b9987bb60a88b14ccbd13a9e6e8ab2a/container.js"></script>
  <script defer src="https://cdn.jsdelivr.net/gh/dashersw/liquid-glass-js@78cb6ccb0b9987bb60a88b14ccbd13a9e6e8ab2a/button.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      window.glassControls = {
        edgeIntensity: 0.016,
        rimIntensity: 0.072,
        baseIntensity: 0.012,
        edgeDistance: 0.18,
        rimDistance: 0.8,
        baseDistance: 0.12,
        cornerBoost: 0.014,
        rippleEffect: 0.026,
        blurRadius: 7
      };

      const apps = {
        soon: {
          name: "???",
          category: "Games",
          desc: "Coming soon.",
          image: "../assets/app_store_icons/soon.png"
        },
        chroma: {
          name: "Chroma",
          category: "Tools",
          desc: "A loaded color tool app.",
          image: "../assets/app_store_icons/chroma.png",
          url: "https://apps.apple.com/uy/app/chroma-a-simple-color-tool/id6738114281"
        },
        entertainmentSoon: {
          name: "Violette",
          category: "Entertainment",
          desc: "An AI chat platform that uses Apple Intelligence to simulate characters for unlimited, offline, private chats.",
          image: "../assets/app_store_icons/violette.png",
          url: "https://apps.apple.com/us/app/violette-chat-with-ai/id6760790799"
        }
      };

      const sections = [
        {
          key: "all",
          label: "All",
          icon: "../assets/app_store_icons/Apps.svg",
          title: "App Store",
          subtitle: "Discover our collection of apps.",
          items: [apps.entertainmentSoon, apps.chroma, apps.soon]
        },
        {
          key: "entertainment",
          label: "Entertainment",
          icon: "../assets/app_store_icons/Entertainment.svg",
          title: "Entertainment",
          subtitle: "Apps made to entertain.",
          items: [apps.entertainmentSoon]
        },
        {
          key: "tools",
          label: "Tools",
          icon: "../assets/app_store_icons/Tool.svg",
          title: "Tools",
          subtitle: "Purpose-built tools for your workflow.",
          items: [apps.chroma]
        },
        {
          key: "games",
          label: "Games",
          icon: "../assets/app_store_icons/Games.svg",
          title: "Games",
          subtitle: "Our series of games made with care.",
          items: [apps.soon]
        }
      ];

      const navGroup = document.getElementById("as-nav-group");
      const titleEl = document.getElementById("as-title");
      const subtitleEl = document.getElementById("as-subtitle");
      const gridEl = document.getElementById("as-grid");
      const lookup = Object.fromEntries(sections.map(s => [s.key, s]));
      const buttons = {};
      const liquidInstances = [];
      const reduceTransparency = window.matchMedia("(prefers-reduced-transparency: reduce)").matches;
      const hasLiquid = typeof Container !== "undefined" &&
        typeof Button !== "undefined" &&
        typeof html2canvas !== "undefined";
      let useLiquid = hasLiquid && !reduceTransparency && supportsWebGL();
      let navShell = null;

      if (useLiquid) {
        try {
          navShell = new Container({ borderRadius: 27, type: "rounded", tintOpacity: 0.1 });
          navShell.element.classList.add("as-nav-glass");
          navGroup.appendChild(navShell.element);
          liquidInstances.push(navShell);
        } catch (error) {
          navGroup.innerHTML = "";
          navShell = null;
          useLiquid = false;
        }
      }

      sections.forEach((section) => {
        if (!useLiquid) {
          const div = document.createElement("div");
          div.className = "as-nav-fallback-row";
          const btn = document.createElement("button");
          btn.className = "as-nav-btn";
          btn.type = "button";
          btn.dataset.key = section.key;
          btn.innerHTML = `<img src="${section.icon}" alt="" class="as-nav-icon"><span>${section.label}</span>`;
          btn.addEventListener("click", () => activate(section.key));
          div.appendChild(btn);
          navGroup.appendChild(div);
          buttons[section.key] = btn;
          return;
        }

        const btn = document.createElement("button");
        btn.className = "as-nav-btn as-liquid-nav";
        btn.type = "button";
        btn.dataset.key = section.key;
        btn.innerHTML = `<img src="${section.icon}" alt="" class="as-nav-icon"><span class="as-nav-label">${section.label}</span>`;
        btn.addEventListener("click", () => activate(section.key));
        navShell.element.appendChild(btn);
        buttons[section.key] = btn;
      });

      function supportsWebGL() {
        try {
          const canvas = document.createElement("canvas");
          return !!(canvas.getContext("webgl2") || canvas.getContext("webgl"));
        } catch (error) {
          return false;
        }
      }

      function activate(key) {
        const section = lookup[key] || lookup.all;
        Object.values(buttons).forEach(b => {
          const isActive = b.dataset.key === section.key;
          b.classList.toggle("is-active", isActive);
          b.setAttribute("aria-pressed", isActive ? "true" : "false");
        });
        titleEl.textContent = section.title;
        subtitleEl.textContent = section.subtitle;
        renderGrid(section.items);
        refreshLiquidGlass();
      }

      function renderGrid(items) {
        gridEl.innerHTML = "";

        items.forEach(app => {
          const card = document.createElement("article");
          card.className = "as-card as-material-card";

          const icon = document.createElement("div");
          icon.className = "as-card-icon";
          if (app.image) {
            const img = document.createElement("img");
            img.src = app.image;
            img.alt = app.name === "???" ? "Coming soon" : app.name;
            icon.appendChild(img);
          }

          const info = document.createElement("div");
          info.className = "as-card-info";

          const nameEl = document.createElement("h3");
          nameEl.className = "as-card-name";
          nameEl.textContent = app.name;

          const desc = document.createElement("p");
          desc.className = "as-card-desc";
          desc.textContent = app.desc;

          const tag = document.createElement("span");
          tag.className = "as-card-tag";
          tag.textContent = app.category;

          info.append(nameEl, desc, tag);

          const cta = createAction(app);

          card.append(icon, info, cta);
          gridEl.appendChild(card);
        });
      }

      function createAction(app) {
        const label = app.url ? "Get" : "Coming Soon";
        return createPlainAction(app, label);
      }

      function createPlainAction(app, label) {
        const cta = app.url ? document.createElement("a") : document.createElement("button");
        cta.className = app.url ? "as-card-cta as-liquid-fallback" : "as-card-cta as-soon-cta";
        cta.textContent = label;
        if (app.url) {
          cta.href = app.url;
          cta.target = "_blank";
          cta.rel = "noopener noreferrer";
          cta.setAttribute("aria-label", `Get ${app.name} on the App Store`);
        } else {
          cta.type = "button";
          cta.disabled = true;
        }
        return cta;
      }

      function refreshLiquidGlass() {
        requestAnimationFrame(() => {
          liquidInstances.forEach(instance => {
            if (instance && typeof instance.updateSizeFromDOM === "function") {
              instance.updateSizeFromDOM();
            }
          });
        });
      }

      let resizeTimer = null;
      window.addEventListener("resize", () => {
        window.clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(refreshLiquidGlass, 120);
      });

      activate("all");
      requestAnimationFrame(refreshLiquidGlass);
    });
  </script>
