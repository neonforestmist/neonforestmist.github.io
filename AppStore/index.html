<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../main.css">
  <link rel="icon" href="../assets/favicon.ico" />
  <link rel="apple-touch-icon" href="../assets/favicon.ico" />
  <title>App Store</title>
  <style>
    :root {
      --as-bg: #ffffff;
      --as-surface: #ffffff;
      --as-text: #1d1d1f;
      --as-secondary: #6e6e73;
      --as-accent: #0071e3;
      --as-accent-hover: #0077ed;
      --as-border: rgba(0, 0, 0, 0.08);
      --as-card-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --as-card-shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.1);
      --as-radius: 16px;
      --as-radius-sm: 12px;
    }

    body.appstore-page {
      overflow-x: hidden;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: var(--as-text);
      background: #fff;
    }

    /* ── Layout ── */
    .as-main {
      padding: 80px 0 0;
      min-height: 0;
      flex: 1 0 auto;
    }

    .as-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      max-width: 1200px;
      margin: 0 auto;
      min-height: calc(100vh - 80px);
    }

    /* ── Sidebar ── */
    .as-sidebar {
      padding: 32px 20px 40px 24px;
      position: sticky;
      top: 80px;
      align-self: start;
      height: fit-content;
    }

    .as-sidebar-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--as-secondary);
      padding: 0 12px;
      margin: 0 0 12px;
    }

    .as-nav-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .as-nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--as-text);
      font-size: 15px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      font-family: inherit;
    }

    .as-nav-btn:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .as-nav-btn.is-active {
      background: rgba(0, 113, 227, 0.08);
      color: var(--as-accent);
    }

    .as-nav-btn.is-active .as-nav-icon {
      opacity: 1;
    }

    .as-nav-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      filter: brightness(0) opacity(0.45);
      transition: filter 0.15s ease;
    }

    .as-nav-btn:hover .as-nav-icon {
      filter: brightness(0) opacity(0.65);
    }

    .as-nav-btn.is-active .as-nav-icon {
      filter: brightness(0) saturate(100%) invert(30%) sepia(90%) saturate(1200%) hue-rotate(200deg) opacity(0.9);
    }

    .as-nav-divider {
      height: 1px;
      background: var(--as-border);
      margin: 10px 12px;
    }

    /* ── Content ── */
    .as-content {
      padding: 32px 40px 64px;
      min-width: 0;
    }

    .as-header {
      margin-bottom: 28px;
    }

    .as-title {
      margin: 0 0 6px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--as-text);
    }

    .as-subtitle {
      margin: 0;
      font-size: 17px;
      font-weight: 400;
      color: var(--as-secondary);
      line-height: 1.5;
    }

    /* ── App Cards ── */
    .as-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .as-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--as-surface);
      border-radius: var(--as-radius-sm);
      box-shadow: var(--as-card-shadow);
      border: 1px solid var(--as-border);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .as-card:hover {
      box-shadow: var(--as-card-shadow-hover);
      transform: translateY(-2px);
    }

    .as-card-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      flex-shrink: 0;
      overflow: hidden;
      background: #f0f0f2;
      display: grid;
      place-items: center;
    }

    .as-card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
    }

    .as-card-info {
      flex: 1;
      min-width: 0;
    }

    .as-card-name {
      margin: 0 0 2px;
      font-size: 17px;
      font-weight: 600;
      color: var(--as-text);
      letter-spacing: -0.01em;
    }

    .as-card-desc {
      margin: 0 0 4px;
      font-size: 14px;
      color: var(--as-secondary);
      line-height: 1.4;
    }

    .as-card-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      color: var(--as-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .as-card-cta {
      padding: 6px 18px;
      border-radius: 980px;
      background: #f0f0f5;
      color: var(--as-accent);
      border: none;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s ease;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .as-card-cta:hover {
      background: #e8e8ed;
    }

    /* ── Empty state ── */
    .as-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--as-secondary);
      font-size: 15px;
    }

    /* ── Mobile toggle ── */
    .as-mobile-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--as-text);
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      z-index: 100;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-family: inherit;
    }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .as-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr;
        min-height: auto;
      }

      .as-content {
        display: contents;
      }

      .as-header {
        order: 1;
        padding: 16px 16px 10px;
        margin-bottom: 0;
      }

      .as-sidebar {
        order: 2;
        position: static;
        padding: 0 16px 12px;
        height: auto;
      }

      .as-sidebar-title {
        display: none;
      }

      .as-nav-group {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px;
      }

      .as-nav-btn {
        width: auto;
        padding: 8px 16px;
        font-size: 14px;
        border-radius: 980px;
        background: rgba(0, 0, 0, 0.04);
      }

      .as-nav-btn.is-active {
        background: var(--as-text);
        color: #fff;
      }

      .as-nav-btn.is-active .as-nav-icon {
        filter: brightness(0) invert(1) opacity(0.9);
      }

      .as-nav-divider {
        display: none;
      }

      .as-grid {
        order: 3;
        padding: 4px 16px 64px;
        overflow: hidden;
      }

      .as-mobile-toggle {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .as-main {
        padding-top: 60px;
      }

      .as-title {
        font-size: 28px;
      }

      .as-subtitle {
        font-size: 15px;
      }

      .as-card {
        gap: 12px;
        padding: 14px;
      }

      .as-card-icon {
        width: 52px;
        height: 52px;
        border-radius: 13px;
      }

      .as-card-icon img {
        border-radius: 13px;
      }

      .as-card-name {
        font-size: 16px;
      }

      .as-card-desc {
        font-size: 13px;
      }
    }
  </style>
</head>
<body class="appstore-page">
  <div class="menu-bar">
    <a href="/">
      <img src="../assets/file.png" alt="Logo" class="menu-logo">
    </a>
    <input type="checkbox" id="menu-toggle" class="menu-toggle" aria-label="Toggle navigation">
    <label for="menu-toggle" class="menu-hamburger" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </label>
    <div class="menu-links menu-links-center">
      <a href="/">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
          <path d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/>
        </svg>
        Home
      </a>
      <a href="/AppStore" class="active">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">

        Projects

        </svg>
        Privacy
      </a>
    </div>
  </div>

  <main class="as-main">
    <div class="as-layout">
      <aside class="as-sidebar" id="as-sidebar">
        <p class="as-sidebar-title">Browse</p>
        <nav class="as-nav-group" id="as-nav-group"></nav>
      </aside>

      <section class="as-content">
        <div class="as-header">
          <h1 class="as-title" id="as-title"></h1>
          <p class="as-subtitle" id="as-subtitle"></p>
        </div>

        <div class="as-grid" id="as-grid"></div>
      </section>
    </div>

    <button class="as-mobile-toggle" id="as-mobile-toggle" type="button" aria-label="Toggle categories">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </main>

  <script>
    (() => {
      const apps = {
        soon: {
          name: "???",
          category: "Games",
          desc: "Coming soon.",
          image: "../assets/app_store_icons/soon.png"
        },
        chroma: {
          name: "Chroma",
          category: "Tools",
          desc: "A loaded color tool app.",
          image: "../assets/app_store_icons/chroma.png",
          url: "https://apps.apple.com/uy/app/chroma-a-simple-color-tool/id6738114281"
        },
        entertainmentSoon: {
          name: "Violette",
          category: "Entertainment",
          desc: "An AI chat platform that uses Apple Intelligence to simulate characters for unlimited, offline, private chats.",
          image: "../assets/app_store_icons/violette.png"

        }
      };

      const sections = [
        {
          key: "all",
          label: "All",
          icon: "../assets/app_store_icons/Apps.svg",
          title: "App Store",
          subtitle: "Discover our collection of apps.",
          items: [apps.chroma, apps.entertainmentSoon, apps.soon]
        },
        {
          key: "games",
          label: "Games",
          icon: "../assets/app_store_icons/Games.svg",
          title: "Games",
          subtitle: "Our series of games made with care.",
          items: [apps.soon]
        },
        {
          key: "tools",
          label: "Tools",
          icon: "../assets/app_store_icons/Tool.svg",
          title: "Tools",
          subtitle: "Purpose-built tools for your workflow.",
          items: [apps.chroma]
        },
        {
          key: "entertainment",
          label: "Entertainment",
          icon: "../assets/app_store_icons/Entertainment.svg",
          title: "Entertainment",
          subtitle: "Apps made to entertain.",
          items: [apps.entertainmentSoon]
        }
      ];

      const navGroup = document.getElementById("as-nav-group");
      const titleEl = document.getElementById("as-title");
      const subtitleEl = document.getElementById("as-subtitle");
      const gridEl = document.getElementById("as-grid");
      const sidebar = document.getElementById("as-sidebar");
      const mobileToggle = document.getElementById("as-mobile-toggle");
      const lookup = Object.fromEntries(sections.map(s => [s.key, s]));
      const buttons = {};

      sections.forEach((section, i) => {
        if (i === 1) {
          const div = document.createElement("div");
          div.className = "as-nav-divider";
          navGroup.appendChild(div);
        }
        const btn = document.createElement("button");
        btn.className = "as-nav-btn";
        btn.dataset.key = section.key;
        btn.innerHTML = `<img src="${section.icon}" alt="" class="as-nav-icon"><span>${section.label}</span>`;
        btn.addEventListener("click", () => activate(section.key));
        navGroup.appendChild(btn);
        buttons[section.key] = btn;
      });

      function activate(key) {
        const section = lookup[key] || lookup.all;
        Object.values(buttons).forEach(b => b.classList.toggle("is-active", b.dataset.key === section.key));
        titleEl.textContent = section.title;
        subtitleEl.textContent = section.subtitle;
        renderGrid(section.items);

        if (sidebar.classList.contains("is-open")) {
          sidebar.classList.remove("is-open");
        }
      }

      function renderGrid(items) {
        gridEl.innerHTML = "";
        items.forEach(app => {
          const card = document.createElement("div");
          card.className = "as-card";

          const icon = document.createElement("div");
          icon.className = "as-card-icon";
          if (app.image) {
            const img = document.createElement("img");
            img.src = app.image;
            img.alt = app.name === "???" ? "Coming soon" : app.name;
            icon.appendChild(img);
          }

          const info = document.createElement("div");
          info.className = "as-card-info";
          info.innerHTML = `
            <h3 class="as-card-name">${app.name}</h3>
            <p class="as-card-desc">${app.desc}</p>
            <span class="as-card-tag">${app.category}</span>
          `;

          const cta = app.url
            ? document.createElement("a")
            : document.createElement("button");
          cta.className = "as-card-cta";
          cta.textContent = app.url ? "Get" : "Coming Soon";

          if (app.url) {
            cta.href = app.url;
            cta.target = "_blank";
            cta.rel = "noopener noreferrer";
          } else {
            cta.type = "button";
          }

          card.append(icon, info, cta);
          gridEl.appendChild(card);
        });
      }

      // Mobile sidebar toggle
      mobileToggle.addEventListener("click", () => {
        sidebar.classList.toggle("is-open");
      });

      document.addEventListener("click", (e) => {
        if (sidebar.classList.contains("is-open") &&
            !sidebar.contains(e.target) &&
            !mobileToggle.contains(e.target)) {
          sidebar.classList.remove("is-open");
        }
      });

      activate("all");
    })();
  </script>
</body>
</html>
